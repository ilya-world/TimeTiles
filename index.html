<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTiles</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel panel-left">
        <div class="logo-block">
          <div class="logo-title-row">
            <h1>TimeTiles</h1>
            <button id="syncProfileBtn" class="icon-btn icon-refresh" title="Синхронизировать профиль" aria-label="Синхронизировать профиль">↻</button>
          </div>
          <p>Сутки как мозаика из 10-минутных плиток</p>
        </div>

        <section class="section">
          <h2>Дни</h2>
          <div id="dayList" class="day-list"></div>
        </section>

        <section class="section switches">
          <label class="switch-row">
            <input type="checkbox" id="toggleTimeLabels" />
            <span>Показывать время в плитках</span>
          </label>
          <label class="switch-row">
            <input type="checkbox" id="toggleTheme" />
            <span>Темный режим</span>
          </label>
          <label class="switch-row">
            <input type="checkbox" id="togglePastDimming" />
            <span>Затемнять прошедшие</span>
          </label>
          <label class="switch-row">
            <input type="checkbox" id="toggleActivityLabels" />
            <span>Показывать названия активностей в клетках</span>
          </label>
          <label class="switch-row">
            <input type="checkbox" id="toggleTileConnections" />
            <span>Соединять плитки</span>
          </label>
          <label class="scale-setting" for="gridScale">
            <span>Масштаб матрицы: <strong id="gridScaleValue">100%</strong></span>
            <input type="range" id="gridScale" min="50" max="100" step="5" value="100" />
          </label>
          <label class="day-setting" for="morningLineTime">
            <span>Линия утра (для выбранного дня)</span>
            <select id="morningLineTime">
              <option value="">Не показывать</option>
              <option value="6">06:00</option>
              <option value="8">08:00</option>
              <option value="10">10:00</option>
              <option value="12">12:00</option>
            </select>
          </label>
        </section>

        <section class="section">
          <button id="openImportModal" class="btn btn-primary">Импорт</button>
        </section>

        <section class="section auth-section">
          <h2>Профиль</h2>
          <p id="authStatus" class="auth-status">Не авторизован</p>
          <div id="authForm" class="auth-form">
            <input type="email" id="authEmail" placeholder="email@example.com" autocomplete="email" />
            <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password" />
            <div class="auth-actions">
              <button id="authLoginBtn" class="btn">Войти</button>
              <button id="authRegisterBtn" class="btn btn-primary">Регистрация</button>
            </div>
          </div>
          <button id="authLogoutBtn" class="btn" hidden>Выйти</button>

          <div id="shareSection" class="share-section" hidden>
            <p class="auth-status">Публичная ссылка на матрицу (только просмотр)</p>
            <div class="share-controls">
              <input type="text" id="shareLinkInput" readonly placeholder="Сначала войдите в профиль" />
              <button id="copyShareLinkBtn" class="btn btn-subtle" type="button">Копировать</button>
            </div>
          </div>
        </section>
      </aside>

      <main class="panel panel-center">
        <div class="center-header">
          <h2 id="selectedDayTitle"></h2>
          <p>12×12 плиток · 24 часа · шаг 10 минут</p>
        </div>

        <div id="grid" class="grid" aria-label="Матрица времени"></div>

        <section class="tile-editor" id="tileEditor">
          <h3>Выбранная плитка: <span id="selectedTileTime">—</span></h3>
          <div class="tile-editor-row">
            <label>Активность</label>
            <div class="activity-inline">
              <span id="selectedActivityName">Не выбрана</span>
              <div class="tile-editor-actions">
                <button id="copySelectedActivity" class="btn btn-subtle">Копировать</button>
                <button id="clearSelectedActivity" class="btn btn-subtle">Очистить</button>
              </div>
            </div>
          </div>
          <div class="tile-editor-row">
            <label for="selectedComment">Комментарий</label>
            <textarea id="selectedComment" rows="2" placeholder="Добавьте заметку к интервалу"></textarea>
          </div>
        </section>
      </main>

      <aside class="panel panel-right">
        <section class="section">
          <h2>Кисти активностей</h2>
          <button id="eraserBrushBtn" class="btn btn-subtle">Стёрка</button>
          <div id="groupsContainer" class="groups-container"></div>
          <button id="addGroupBtn" class="btn">+ Группа</button>
          <button id="addUngroupedActivityBtn" class="btn btn-primary">+ Активность</button>
        </section>

        <section class="section">
          <h2>Палитра</h2>
          <div id="palette" class="palette"></div>
          <label class="custom-color">
            Свой цвет
            <input type="color" id="customColorPicker" value="#2d6cdf" />
          </label>
        </section>
      </aside>
    </div>

    <dialog id="importModal">
      <form method="dialog" class="modal-content" id="importForm">
        <h3>Импорт встреч</h3>
        <p>Каждая строка: <code>XX:XX-YY:YY NAME</code></p>
        <textarea id="importText" rows="10" placeholder="09:00-09:45 Standup
13:10-14:00 Demo"></textarea>
        <div class="modal-actions">
          <button class="btn" value="cancel">Отмена</button>
          <button class="btn btn-primary" id="applyImport" value="default">Импортировать</button>
        </div>
      </form>
    </dialog>

    <div id="tooltip" class="tooltip" role="tooltip"></div>

    <template id="groupTemplate">
      <article class="group-card">
        <div class="group-header">
          <div class="group-title-wrap">
            <input class="group-name" />
            <input class="group-color" type="color" />
          </div>
          <button class="icon-btn delete-group" title="Удалить группу">✕</button>
        </div>
        <div class="group-actions">
          <button class="btn btn-subtle add-activity-in-group">+ Активность в группе</button>
        </div>
        <div class="activities"></div>
      </article>
    </template>

    <template id="activityTemplate">
      <div class="activity-brush">
        <button class="brush-button"></button>
        <input class="activity-name" />
        <input class="activity-color" type="color" />
        <button class="icon-btn delete-activity" title="Удалить активность">🗑</button>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
